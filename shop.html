<script>
  window.dataLayer = window.dataLayer || [];

  const products = [
    {
      id: "101",
      name: "Classic Black Tee",
      category: "Casual",
      price: 499,
      oldPrice: 699,
      image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80",
      description: "A clean black cotton t-shirt perfect for everyday wear."
    },
    {
      id: "102",
      name: "Minimal White Tee",
      category: "Casual",
      price: 549,
      oldPrice: 749,
      image: "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?auto=format&fit=crop&w=900&q=80",
      description: "Premium soft-touch white t-shirt with a modern fit."
    },
    {
      id: "103",
      name: "Oversized Street Tee",
      category: "Oversized",
      price: 799,
      oldPrice: 999,
      image: "https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=900&q=80",
      description: "Trendy oversized t-shirt for a bold streetwear style."
    },
    {
      id: "104",
      name: "Graphic Printed Tee",
      category: "Printed",
      price: 899,
      oldPrice: 1199,
      image: "https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=900&q=80",
      description: "Eye-catching graphic t-shirt designed for statement looks."
    },
    {
      id: "105",
      name: "Vintage Wash Tee",
      category: "Printed",
      price: 749,
      oldPrice: 949,
      image: "https://images.unsplash.com/photo-1484515991647-c5760fcecfc7?auto=format&fit=crop&w=900&q=80",
      description: "Vintage-wash tee with comfortable fabric and faded styling."
    },
    {
      id: "106",
      name: "Navy Oversized Premium Tee",
      category: "Oversized",
      price: 849,
      oldPrice: 1099,
      image: "https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=900&q=80",
      description: "Premium oversized navy t-shirt for relaxed all-day comfort."
    },
    {
      id: "107",
      name: "Sand Beige Essential Tee",
      category: "Premium",
      price: 999,
      oldPrice: 1299,
      image: "https://images.unsplash.com/photo-1484516758160-69878111a911?auto=format&fit=crop&w=900&q=80",
      description: "A premium neutral-toned essential tee made for elevated casual outfits."
    },
    {
      id: "108",
      name: "Urban Blue Relaxed Tee",
      category: "Premium",
      price: 1099,
      oldPrice: 1399,
      image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=80",
      description: "Relaxed premium tee with a deep urban blue tone and clean finish."
    }
  ];

  let currentCategory = "All";
  let currentSort = "default";
  let currentSearch = "";
  let wishlist = JSON.parse(localStorage.getItem("teetrendz_wishlist")) || [];

  function trackEvent(eventName, payload = {}) {
    window.dataLayer.push({
      event: eventName,
      ...payload
    });
    console.log("dataLayer event:", eventName, payload);
  }

  function getCart() {
    return JSON.parse(localStorage.getItem("teetrendz_cart")) || [];
  }

  function saveCart(cart) {
    localStorage.setItem("teetrendz_cart", JSON.stringify(cart));
  }

  function updateCartCount() {
    const cart = getCart();
    const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById("cartCount").textContent = totalQty;
  }

  function showToast(message) {
    const toastText = document.getElementById("toastText");
    const toastElement = document.getElementById("cartToast");

    if (!toastText || !toastElement) return;

    toastText.textContent = message;

    if (window.bootstrap) {
      const toast = bootstrap.Toast.getOrCreateInstance(toastElement);
      toast.show();
    }
  }

  function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;

    const cart = getCart();
    const existing = cart.find(item => item.id === productId);

    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({
        id: product.id,
        name: product.name,
        category: product.category,
        price: product.price,
        image: product.image,
        quantity: 1,
        selectedSize: "M"
      });
    }

    saveCart(cart);
    updateCartCount();

    trackEvent("add_to_cart", {
      ecommerce: {
        currency: "INR",
        value: product.price,
        items: [{
          item_id: product.id,
          item_name: product.name,
          item_category: product.category,
          price: product.price,
          quantity: 1
        }]
      }
    });

    showToast(product.name + " added to cart");
  }

  function toggleWishlist(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;

    const alreadyWishlisted = wishlist.includes(productId);

    if (alreadyWishlisted) {
      wishlist = wishlist.filter(id => id !== productId);
    } else {
      wishlist.push(productId);
    }

    localStorage.setItem("teetrendz_wishlist", JSON.stringify(wishlist));

    trackEvent("wishlist_toggle", {
      product_id: product.id,
      product_name: product.name,
      wishlist_status: alreadyWishlisted ? "removed" : "added"
    });

    renderProducts();
  }

  function trackProductSelect(product, source) {
    if (!product) return;

    trackEvent("select_item", {
      ecommerce: {
        item_list_name: source,
        items: [{
          item_id: product.id,
          item_name: product.name,
          item_category: product.category,
          price: product.price
        }]
      }
    });
  }

  function openQuickView(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;

    document.getElementById("modalCategory").textContent = product.category;
    document.getElementById("modalName").textContent = product.name;
    document.getElementById("modalPrice").textContent = product.price;
    document.getElementById("modalOldPrice").textContent = product.oldPrice;
    document.getElementById("modalDescription").textContent = product.description;
    document.getElementById("modalImage").src = product.image;

    document.getElementById("modalAddBtn").onclick = function () {
      addToCart(product.id);
    };

    document.getElementById("modalViewBtn").href = "product.html?id=" + product.id;
    document.getElementById("modalViewBtn").onclick = function () {
      trackProductSelect(product, "shop_quick_view");
    };

    trackEvent("view_item", {
      ecommerce: {
        currency: "INR",
        value: product.price,
        items: [{
          item_id: product.id,
          item_name: product.name,
          item_category: product.category,
          price: product.price
        }]
      }
    });

    if (window.bootstrap) {
      const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById("quickViewModal"));
      modal.show();
    }
  }

  function getFilteredProducts() {
    let filtered = [...products];

    if (currentCategory !== "All") {
      filtered = filtered.filter(product => product.category === currentCategory);
    }

    if (currentSearch.trim() !== "") {
      const keyword = currentSearch.toLowerCase().trim();

      filtered = filtered.filter(product =>
        product.name.toLowerCase().includes(keyword) ||
        product.category.toLowerCase().includes(keyword) ||
        product.description.toLowerCase().includes(keyword)
      );
    }

    if (currentSort === "low-high") {
      filtered.sort((a, b) => a.price - b.price);
    } else if (currentSort === "high-low") {
      filtered.sort((a, b) => b.price - a.price);
    } else if (currentSort === "name-asc") {
      filtered.sort((a, b) => a.name.localeCompare(b.name));
    }

    return filtered;
  }

  function applySearch() {
    const searchInput = document.getElementById("searchInput");
    currentSearch = searchInput ? searchInput.value.trim() : "";

    const results = getFilteredProducts();

    trackEvent("internal_search", {
      search_term: currentSearch,
      search_category: currentCategory,
      result_count: results.length,
      result_status: results.length > 0 ? "with_result" : "without_result"
    });

    renderProducts();
  }

  function renderProducts() {
    const grid = document.getElementById("productGrid");
    const count = document.getElementById("productCount");
    const emptyState = document.getElementById("emptyState");

    if (!grid || !count || !emptyState) return;

    const filtered = getFilteredProducts();

    grid.innerHTML = "";
    count.textContent = filtered.length;

    if (filtered.length === 0) {
      emptyState.classList.remove("d-none");
    } else {
      emptyState.classList.add("d-none");
    }

    filtered.forEach(product => {
      const isWishlisted = wishlist.includes(product.id);
      const col = document.createElement("div");
      col.className = "col-md-6 col-xl-4";

      col.innerHTML = `
        <div class="card product-card">
          <img src="${product.image}" alt="${product.name}" class="card-img-top">
          <div class="card-body p-4">
            <span class="badge badge-soft mb-2">${product.category}</span>
            <h5 class="fw-bold">${product.name}</h5>
            <p class="mini-text">${product.description}</p>
            <p class="price mb-3">
              ₹${product.price}
              <span class="old-price">₹${product.oldPrice}</span>
            </p>

            <div class="d-grid gap-2">
              <button class="btn btn-primary add-cart-btn" data-id="${product.id}">Add to Cart</button>
              <button class="btn btn-outline-dark quick-view-btn" data-id="${product.id}">Quick View</button>
              <button class="btn btn-outline-danger wishlist-btn ${isWishlisted ? "active" : ""}" data-id="${product.id}">
                ${isWishlisted ? "Wishlisted" : "Add to Wishlist"}
              </button>
              <a href="product.html?id=${product.id}" class="btn btn-outline-secondary view-product-btn" data-id="${product.id}">
                View Product Page
              </a>
            </div>
          </div>
        </div>
      `;

      grid.appendChild(col);
    });

    bindProductButtons();

    trackEvent("view_item_list", {
      ecommerce: {
        item_list_name: "Shop Product Grid",
        items: filtered.map(product => ({
          item_id: product.id,
          item_name: product.name,
          item_category: product.category,
          price: product.price
        }))
      }
    });
  }

  function bindProductButtons() {
    document.querySelectorAll(".add-cart-btn").forEach(btn => {
      btn.addEventListener("click", function () {
        addToCart(this.dataset.id);
      });
    });

    document.querySelectorAll(".quick-view-btn").forEach(btn => {
      btn.addEventListener("click", function () {
        openQuickView(this.dataset.id);
      });
    });

    document.querySelectorAll(".wishlist-btn").forEach(btn => {
      btn.addEventListener("click", function () {
        toggleWishlist(this.dataset.id);
      });
    });

    document.querySelectorAll(".view-product-btn").forEach(btn => {
      btn.addEventListener("click", function () {
        const product = products.find(p => p.id === this.dataset.id);
        trackProductSelect(product, "shop_grid");
      });
    });
  }

  function setCategory(category) {
    currentCategory = category;

    document.querySelectorAll(".chip-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.category === category);
    });

    trackEvent("product_filter_click", {
      filter_name: "category",
      filter_value: category
    });

    renderProducts();
  }

  function resetFilters() {
    currentCategory = "All";
    currentSort = "default";
    currentSearch = "";

    const sortSelect = document.getElementById("sortSelect");
    const searchInput = document.getElementById("searchInput");

    if (sortSelect) sortSelect.value = "default";
    if (searchInput) searchInput.value = "";

    document.querySelectorAll(".chip-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.category === "All");
    });

    trackEvent("product_filter_reset", {
      page_type: "shop"
    });

    renderProducts();
  }

  function bindControls() {
    document.querySelectorAll(".chip-btn").forEach(btn => {
      btn.addEventListener("click", function () {
        setCategory(this.dataset.category);
      });
    });

    const sortSelect = document.getElementById("sortSelect");
    if (sortSelect) {
      sortSelect.addEventListener("change", function () {
        currentSort = this.value;

        trackEvent("shop_sort_change", {
          sort_value: currentSort
        });

        renderProducts();
      });
    }

    const searchBtn = document.getElementById("searchSubmitBtn");
    const searchInput = document.getElementById("searchInput");

    if (searchBtn) {
      searchBtn.addEventListener("click", applySearch);
    }

    if (searchInput) {
      searchInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          applySearch();
        }
      });
    }

    const resetBtn = document.getElementById("resetBtn");
    const emptyResetBtn = document.getElementById("emptyResetBtn");

    if (resetBtn) resetBtn.addEventListener("click", resetFilters);
    if (emptyResetBtn) emptyResetBtn.addEventListener("click", resetFilters);
  }

  document.addEventListener("DOMContentLoaded", function () {
    updateCartCount();
    bindControls();
    renderProducts();

    trackEvent("shop_page_view", {
      page_type: "shop"
    });
  });
</script>
